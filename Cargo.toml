[package]
name = "pirs"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
crossterm = "0.28"
futures-util = "0.3.32"
ratatui = "0.29"
reqwest = { version = "0.13.2", features = ["json", "stream"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.50.0", features = ["full"] }
tui-textarea = { version = "0.7", default-features = false, features = ["crossterm"] }
